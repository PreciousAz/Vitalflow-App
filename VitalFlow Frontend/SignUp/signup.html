<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Vita Flow</title>
    <link rel="stylesheet" href="./signup.css" />
    <link rel="stylesheet" href="/global.css">
    <script src="/global.js"></script>
</head>

<body>
    <div class="container">
        <div class="div-main">
            <div class="left-section">
                <div class="branding">Vita flow</div>
                <div class="branding-home"><a href="/index.html">Home</a></div>
            </div>
            <div class="right-section">
                <form class="form" id="signupForm">
                    <h2>Register Your Account</h2>

                    <label for="accountType">Account Type</label>
                    <select id="accountType" name="accountType" required>
                        <option value="" disabled selected>Select account type</option>
                        <option value="doctor">Doctor</option>
                        <option value="patient">Patient</option>
                    </select>

                    <div class="form-group" id="titleGroup" style="display: none;">
                        <label for="title">Professional Title <small>(e.g., Dr., Nurse, Consultant)</small></label>
                        <select id="title" name="title">
                            <option value="" disabled selected>Select Title</option>
                            <option value="Dr.">Dr.</option>
                            <option value="Nurse">Nurse</option>
                            <option value="Consultant">Consultant</option>
                            <option value="Prof.">Prof.</option>
                            <option value="Mr.">Mr.</option>
                            <option value="Mrs.">Mrs.</option>
                            <option value="Ms.">Ms.</option>
                        </select>
                    </div>

                    <label>Full Name</label>
                    <input name="fullname" type="text" placeholder="Full Name" required />

                    <label>Email Address</label>
                    <input name="email" type="email" placeholder="Email Address" required />

                    <label>Phone Number</label>
                    <div class="phone-input">
                        <select name="countryCode">
                            <option value="+234">+234</option>
                            <option value="+44" selected>+44</option>
                            <option value="+1">+1</option>
                        </select>
                        <input name="phone" type="number" placeholder="Phone Number" required />
                    </div>

                    <label>Date Of Birth</label>
                    <input name="dob" type="date" required />

                    <label>Gender</label>
                    <div class="gender-options">
                        <input type="radio" id="male" name="gender" value="M">
                        <label for="male" class="gender-option">Male</label>

                        <input type="radio" id="female" name="gender" value="F">
                        <label for="female" class="gender-option">Female</label>

                        <input type="radio" id="other" name="gender" value="Other">
                        <label for="other" class="gender-option">Other</label>
                    </div>

                    <label>Residential Address</label>
                    <input name="address" type="text" placeholder="Residential Address" required />

                    <label>Password</label>
                    <div class="password-field">
                        <input name="password" type="password" id="passwordInput" placeholder="Password" required />
                        <span id="togglePassword">&#128065;</span>
                    </div>

                    <!-- <div class="terms">
                        <input type="checkbox" required />
                        <span>I agree with the <a href="#">terms</a> and <a href="#">condition</a></span>
                    </div> -->
                    <div id="error-msg" class="error"></div>
                    <button type="submit" class="signup-btn">
                        <span class="btn-text">Sign Up</span>
                        <span class="spinner"></span>
                    </button>

                    <!-- <div class="or">Or</div>

                <div class="social-signup">
                    <button type="button" class="google-btn">
                        <img src="https://img.icons8.com/color/16/google-logo.png" /> Sign up with google
                    </button>
                    <button type="button" class="facebook-btn">
                        <img src="https://img.icons8.com/ios-filled/20/ffffff/facebook--v1.png" /> Sign up with facebook
                    </button>
                </div> -->

                    <p class="signin-link">Already have an account? <a href="/Login/login.html">Sign In</a></p>
                </form>
            </div>
        </div>

    </div>

    <dialog id="popupDialog">
        <div class="dialog-content">
            <h3>Culture</h3>
            <p id="dialogText">This is a popup.</p>
            <div class="dialog-buttons">
                <button id="okButton" class="ok-btn">OK</button>
                <button id="closeButton" class="close-btn">Cancel</button>
            </div>
        </div>
    </dialog>
    <script src="./signup.js"></script>
</body>

</html>
