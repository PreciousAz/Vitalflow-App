<div class="ccontainer main-div">
    <div
        style="display: flex;justify-content: space-between; align-items: center; flex-direction: row; padding-left: 30px;padding-right: 50px;">
        <div class="gder-text">
            <h2 class="cmt-7 cfs-4">Good Day <span id="dashName">Camilla Brooke</span></h2>
            <p class="text-sm">Manage your dashboard and have a wonderful day</p>
        </div>
        <div class="div-btn-home">
            <button class="rem-btn"><i class="bi bi-plus"></i>Set Reminder </button>
            <button class="book-btn" onclick="navigateToBookingPage()"><i class="bi bi-node-plus"></i> Book
                Appointment</button>
        </div>

    </div>

    <main class="main">
        <div class="stats-container">
            <div class="stat-card appointments">
                <h4>Appointments</h4>
                <p class="value" id="appoint">-</p>
                <span class="time">Last 7 days</span>
                <span class="change up">+20%</span>
            </div>

            <div class="stat-card blood-pressure">
                <h4>Blood Pressure</h4>
                <p class="value">89 <small>g/dl</small></p>
                <span class="time">Last 7 days</span>
                <span class="change up">+10%</span>
            </div>

            <div class="stat-card heart-rate">
                <h4>Heart Rate</h4>
                <p class="value">86 <small>bpm</small></p>
                <span class="time">Last 7 days</span>
                <span class="change up">+5%</span>
            </div>

            <div class="stat-card weight">
                <h4>Weight</h4>
                <p class="value">80<small>kg</small></p>
                <span class="time">Last 7 days</span>
                <span class="change up">+2%</span>
            </div>
        </div>
