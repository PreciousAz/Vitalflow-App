<div class="container-settings">
    <div class="tabs">
        <button class="tab active" data-tab="profile">Profile</button>
        <!-- <button class="tab" data-tab="availability">Availability</button>
        <button class="tab" data-tab="reviews">Reviews</button> -->
    </div>

    <div class="card-div">
        <div class="profile-header">
            <img id="profileSettingsImage" class="profile-pic" />
            <div>
                <h2 id="settingsName"></h2>
                <p><i class="fa fa-map-marker"></i><span id="address"></span></p>
                <p><i class="fa fa-envelope"></i><a href="mailto:" id="email"></a></p>
                <p><i class="fa fa-phone"></i><a href="tel:" id="phone"></a></p>
            </div>
            <button class="edit-btn" onclick="openEditModal()">Edit Profile</button>
        </div>
        <div class="ecd-div" style="margin-top: 10px;">
            <h5>Emmergency Contact Details</h5>
            <p>Name: <strong id="ecdName"></strong></p>
            <p>Relationship: <strong id="ecdRel"></strong></p>
            <p>Contact Phone: <strong id="ecdPhone"></strong></p>
            <p>Preferred Doctor: <strong id="ecdDoc"></strong></p>
        </div>
        <div class="tab-content hidden" id="availability">
            <p>Doctor’s availability will be shown here.</p>
        </div>

        <div class="tab-content hidden" id="reviews">
            <p>Doctor’s reviews will be shown here.</p>
        </div>
    </div>
</div>

<div class="modal" id="editProfileModal">
    <div class="modal-content">
        <span class="close" onclick="closeEditModal()">&times;</span>
        <h3>Edit Profile</h3>
        <form id="editProfileForm">
            <label for="profilePhoto" class="profile-photo-label">
                <div class="photo-holder" id="photoHolder">
                    <span>Click to upload profile photo</span>
                    <img id="previewImage" style="display: none;" />
                </div>
                <input type="file" id="profilePhoto" name="profilePhoto" accept="image/*" hidden />
            </label>
            <label for="emergencyName">Emergency Contact Name</label>
            <input type="text" id="emergencyName" name="emergencyName" required />

            <label for="emergencyPhone">Phone Number</label>
            <input type="tel" id="emergencyPhone" name="emergencyPhone" required />

            <label for="emergencyRelation">Relationship</label>
            <input type="text" id="emergencyRelation" name="emergencyRelation" required />

            <label for="preferredSpecialty">Preferred Doctor/Specialty</label>
            <input type="text" id="preferredSpecialty" name="preferredSpecialty" required />

            <button type="submit">
                <span class="btn-text">Save Changes</span>
                <span class="spinner"></span>
            </button>
        </form>
    </div>
</div>
