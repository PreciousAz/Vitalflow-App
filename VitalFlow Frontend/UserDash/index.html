<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vita Flow</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="/global.css">
    <link rel="stylesheet" href="./index.css">
    <script src="/global.js"></script>
</head>

<body>
    <!-- loading indicator -->
    <div id="loading">
        <div class="spinner"></div>
    </div>
    <div class="main-div">
        <div class="row g-0">
            <div class="col-md-2">
                <div class="side-bar">
                    <div class="side-header">
                        <div class="logo cd-flex cflex-row justify-center calign-center">
                             <img src="/Assets/icons/logo.png" alt="">
                        </div>
                    </div>
                    <nav class="cd-flex cflex-column justify-center">
                        <ul>
                            <li class="nav-link active"><a href="#home" class="cfs-6 ctext-normal ctext-light"><i
                                        class="bi bi-columns-gap cmr-3 cfs-5"></i> Dashboard</a></li>
                         <!--    <li class="nav-link"><a href="#appointments" class="cfs-6 ctext-normal ctext-light"><i
                                        class="fa fa-calendar-check cmr-3 cfs-5"></i> Appointments</a></li> -->
                            <li class="nav-link"><a href="#messages" class="cfs-6 ctext-normal ctext-light"><i
                                        class="bi bi-envelope cmr-3 cfs-5"></i> Messages</a></li>

                            <li class="nav-link"><a href="#invioce" class="cfs-6 ctext-normal ctext-light"><i
                                        class="bi bi-receipt cmr-3 cfs-5"></i> Invioce</a></li>

                            <!--  <li class="nav-link"><a href="#booking" class="cfs-6 ctext-normal ctext-light"><i
                                            class="bi bi-calendar2-minus cmr-3 cfs-5"></i> Settings</a></li>

                            <li class="nav-link"><a href="#package" class="cfs-6 ctext-normal ctext-light"><i
                                        class="bi bi-box2-heart cmr-3 cfs-5"></i> Packages</a></li> -->
                            <li class="nav-link"><a href="#settings" class="cfs-6 ctext-normal ctext-light">
                                    <i class="fa fa-cog cmr-3 cfs-5"></i> Settings</a></li>
                        </ul>

                    </nav>
                    <!-- <div class="side-footer">
                        <a id="logout" class="cfs-6 ctext-normal ctext-dark"><i class="bi bi-box-arrow-right cmr-2"></i>
                            Log out</a>
                    </div> -->
                </div>
            </div>
            <div class="col-md-10">
                <div class="top-bar">
                    <div class="header-right">
                        <div style="cursor: pointer;">
                            <i class="fa fa-bell"></i>
                        </div>
                        <div class="mes-badge" onclick="Navi()">
                            <i class="bi bi-chat-dots"></i>
                            <span class="badge" id="mesCount">3</span>
                        </div>

                        <div style="display: flex; flex-direction: row;gap: 6px;margin: 0 20px;">
                            <img  id="profileImage" class="avatar" alt="User Avatar">
                            <div class="user-info">
                                <p id="name">Dr Anabel Franis</p>
                            </div>
                        </div>
                        <div>
                            <a id="logout" class="logout-div">Log out<i class="bi bi-box-arrow-right cmr-2"></i>
                            </a>
                        </div>
                    </div>
                </div>
                <div id="content"></div>
            </div>
        </div>
    </div>
    <dialog id="popupDialog">
        <div class="dialog-content">
            <h3>VitalFlow</h3>
            <p id="dialogText">This is a popup.</p>
            <div class="dialog-buttons">
                <button id="okButton" class="ok-btn">OK</button>
                <button id="closeButton" class="close-btn">Cancel</button>
            </div>
        </div>
    </dialog>
    <script src="./index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</body>

</html>
