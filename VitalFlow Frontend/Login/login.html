<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vita Flow - Sign In</title>
  <link rel="stylesheet" href="./login.css" />
  <link rel="stylesheet" href="/global.css">
  <script src="/global.js"></script>
</head>

<body>
  <div class="container">
    <div class="form-container">
      <h2>Sign In</h2>
      <form id="loginForm">
        <label>Email Address</label>
        <input type="email" name="email" id="email" required placeholder="Email Address" />

        <label>Password</label>
        <input type="password" name="password" required placeholder="Password" />

        <!--  <div class="forgot">
          <a href="#">Forget Password</a>
        </div> -->
        <button type="submit">
          <span class="btn-text">Sign In</span>
          <span class="spinner"></span>
        </button>
      </form>

      <p class="signup-text">Don't have an account? <a href="/SignUp//signup.html">Sign up</a></p>
    </div>
  </div>
  <dialog id="popupDialog">
    <div class="dialog-content">
      <h3>Culture</h3>
      <p id="dialogText">This is a popup.</p>
      <div class="dialog-buttons">
        <button id="okButton" class="ok-btn">OK</button>
        <button id="closeButton" class="close-btn">Cancel</button>
      </div>
    </div>
  </dialog>
  <script src="./login.js"></script>
</body>

</html>
