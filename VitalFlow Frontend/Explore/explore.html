<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Find A Doctor - Vita Flow</title>
    <link rel="stylesheet" href="./explore.css" />
    <link rel="stylesheet" href="/global.css">
    <script src="/global.js"></script>
</head>

<body>

    <!-- Navigation -->
      <header>
        <div class="hder-nav">
            <div class="logo">Vita Flow</div>
            <nav class="nav">
                <ul>
                    <li><a href="/index.html">Home</a></li>
                    <li><a href="/About//about.html">About us</a></li>
                    <li><a href="/Doctors/doc.html">Doctors</a></li>
                    <li><a href="#">Find a Doctor</a></li>
                    <li><a href="#">Contact us</a></li>
                </ul>
            </nav>
            <div class="header-buttons">
                <a href="/Login/login.html">
                    <button class="login cfs-7">Sign In</button>
                </a>
                <a href="/SignUp/signup.html"><button class="signup cfs-7">Sign Up</button></a>
            </div>
            <div class="menu-toggle" id="menu-toggle">☰</div>
        </div>

    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="search-bar">
            <input type="text" placeholder="Search for a doctor or speciality" />
            <input type="text" placeholder="Location" />
            <button class="filter-btn">🔍</button>
        </div>
    </section>

    <!-- Filter + Results Section -->
    <section class="main-content">
        <aside class="filters">
            <div class="filter-header">
                <h3>Filter</h3>
                <a href="#" id="clearFilters">Clear All</a>
            </div>
            <div class="filter-block">
                <label>Search</label>
                <input type="text" id="searchInput" placeholder="Search" />
            </div>
            <div class="filter-block">
                <label>Specialities</label>
                <label><input type="checkbox" value="Cardiology" class="speciality" /><span>Cardiology</span> </label>
                <label><input type="checkbox" value="Neurology" class="speciality" /> <span>Neurology</span></label>
                <label><input type="checkbox" value="Endocrinology" class="speciality" /><span>Endocrinology</span> </label>
                <label><input type="checkbox" value="Ophthalmology" class="speciality" /> <span>Ophthalmology</span></label>
            </div>
            <div class="filter-block">
                <label>Gender</label>
                <label><input type="checkbox" value="Male" class="gender" /><span>Male</span> </label>
                <label><input type="checkbox" value="Female" class="gender" /><span>Female</span> </label>
            </div>
            <div class="filter-block">
                <label>Availability</label>
                <label><input type="checkbox" value="Today" class="availability" /><span>Today</span> </label>
                <label><input type="checkbox" value="Tomorrow" class="availability" /><span>Tomorrow</span> </label>
            </div>
            <div class="filter-block exec">
                <label>Pricing</label>
                <span id="priceDisplay">Range £0–£2000</span>
                <input type="range" min="0" max="2000" value="2000" id="priceRange"/>
            </div>
        </aside>

        <div class="results">
            <h3 class="h3-class">Showing <span id="counter-lab">6</span> Results</h3>
            <div class="doctor-list-container">
                <div id="doctorList" class="doctor-grid"></div>
            </div>
        </div>
    </section>

    <!-- Footer -->
     <footer>
        <div class="footer-nav">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About us</a></li>
                <li><a href="#">Find a Doctor</a></li>
                <li><a href="#">Contact us</a></li>
            </ul>
        </div>
        <div class="footer-brand">V I T A F L O W</div>
    </footer>

    <script src="./explore.js"></script>
</body>

</html>
